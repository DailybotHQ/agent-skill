name: Auto-release on merge to main

# Mirrors the auto-release behavior of `DailybotHQ/cli` adapted to a
# markdown+bash repo: every merge to `main` produces a new GitHub Release
# unless the merge itself is the bot's own release commit.
#
# Bump rule (conventional-commit-aware, with PATCH as the safe default):
#   feat(...)!: / "BREAKING CHANGE:" in body  → MAJOR
#   feat(...):                                → MINOR
#   anything else (incl. no prefix)           → PATCH
#
# OPT-IN ESCAPE HATCH — the `[skip release]` marker:
# A `[skip release]` token anywhere in the body of the head commit on `main`
# (i.e. the squash-merge commit) suppresses PSR-style version bumps. Use it
# only for contributor-kit / tooling PRs that do NOT change
# `skills/dailybot/` (the installed artifact) — e.g. DWP onboarding,
# AI Diff Reviewer wiring, docs-only contributor infrastructure. Placing
# the marker on a PR that changes shipped skill behavior is a bug.
#
# What it does:
#   1. Reads the current version from skills/dailybot/SKILL.md frontmatter
#   2. Looks at commits since the last `vX.Y.Z` git tag and decides MAJOR/MINOR/PATCH
#   3. Writes the new version into all SKILL.md files under skills/dailybot/
#   4. Prepends a new section to CHANGELOG.md with the merged commits as bullets
#   5. Commits as "Dailybot Automations" with `[skip ci]` to break the loop
#   6. Tags `vX.Y.Z` and pushes
#   7. Creates a GitHub Release with the changelog section as the body

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: auto-release-main
  cancel-in-progress: false

jobs:
  release:
    name: Bump version, tag, release
    runs-on: ubuntu-latest
    # Skip our own release commits to prevent an infinite loop.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Uses `AUTOMATION_GITHUB_TOKEN` (the same secret name the
          # `DailybotHQ/cli` repo uses for its semantic-release flow) so
          # the bot user (`dailybotops`) can push to the protected
          # `main` branch. Falls back to the default GITHUB_TOKEN, which
          # will fail at the push step unless `github-actions[bot]` is
          # in the branch-protection bypass list.
          token: ${{ secrets.AUTOMATION_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up git identity
        run: |
          git config user.name "Dailybot Automations"
          git config user.email "ops@dailybot.com"

      - name: Detect [skip release] marker on head commit
        id: skip_release
        run: |
          set -euo pipefail
          BODY="$(git log -1 --pretty=%B)"
          if printf '%s' "$BODY" | grep -Fq '[skip release]'; then
            echo "Found [skip release] on head commit — suppressing auto-release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine bump level + new version
        id: version
        if: steps.skip_release.outputs.skip != 'true'
        run: |
          set -euo pipefail
          # Read current version from the router SKILL.md (single source of truth)
          CURRENT=$(awk -F'"' '/^version:/ {print $2; exit}' skills/dailybot/SKILL.md)
          if [ -z "$CURRENT" ]; then
            echo "Could not read current version from skills/dailybot/SKILL.md" >&2
            exit 1
          fi

          # Find last release tag (vX.Y.Z). Empty if no tag yet.
          LAST_TAG=$(git tag --list 'v*.*.*' --sort=-v:refname | head -n1)
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --pretty=format:"%s" --invert-grep --grep='^chore(release):')
          else
            COMMITS=$(git log "${LAST_TAG}..HEAD" --pretty=format:"%s" --invert-grep --grep='^chore(release):')
          fi

          # Stop early if nothing meaningful since last tag.
          if [ -z "$COMMITS" ]; then
            echo "No releasable commits since ${LAST_TAG:-(repo start)}; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="patch"
          if echo "$COMMITS" | grep -qE '^(feat|fix|chore|refactor|perf|build|ci|docs|test|style)(\([^)]*\))?!:' \
             || git log "${LAST_TAG:+${LAST_TAG}..HEAD}" --pretty=format:"%B" | grep -qE '^BREAKING CHANGE:'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE '^feat(\([^)]*\))?:'; then
            BUMP="minor"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "last_tag=$LAST_TAG" >> "$GITHUB_OUTPUT"

          {
            echo 'commits<<EOF'
            echo "$COMMITS"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Bump version in SKILL.md files
        if: steps.skip_release.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          while IFS= read -r f; do
            sed -i "s/^version: \".*\"/version: \"${NEW_VERSION}\"/" "$f"
          done < <(find skills/dailybot -name 'SKILL.md')

      - name: Update CHANGELOG.md
        if: steps.skip_release.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        env:
          # Pass commit subjects through the environment, NOT via ${{ }}
          # interpolation into the script. A commit message can contain shell
          # metacharacters (e.g. a `"` in `pin agent identity to "Agent Skill"`),
          # which would otherwise break the string assignment and execute the rest
          # as commands (exit 127) — and is a command-injection vector.
          COMMITS: ${{ steps.version.outputs.commits }}
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          DATE=$(date -u +%Y-%m-%d)

          # Build the new section.
          {
            echo "## [${NEW_VERSION}] — ${DATE}"
            echo ""
            echo "### Changes"
            echo ""
            while IFS= read -r line; do
              [ -n "$line" ] && echo "- ${line}"
            done <<< "$COMMITS"
            echo ""
          } > /tmp/new_section.md

          # Insert the new section after the leading "# Changelog" header
          # paragraph but before the first existing version section.
          awk -v section_file=/tmp/new_section.md '
            BEGIN {
              while ((getline line < section_file) > 0) section = section line "\n"
              close(section_file)
              inserted = 0
            }
            /^## \[/ && !inserted { print section; inserted = 1 }
            { print }
            END {
              if (!inserted) print section
            }
          ' CHANGELOG.md > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

      - name: Commit, tag, push
        if: steps.skip_release.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.version.outputs.new_version }}"
          NEW_TAG="${{ steps.version.outputs.new_tag }}"
          git add -A
          git commit -m "chore(release): ${NEW_VERSION} [skip ci]"
          git tag -a "$NEW_TAG" -m "Release ${NEW_VERSION}"
          git push origin main --follow-tags

      - name: Create GitHub Release
        if: steps.skip_release.outputs.skip != 'true' && steps.version.outputs.skip != 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.new_tag }}
          name: ${{ steps.version.outputs.new_version }}
          generate_release_notes: true
